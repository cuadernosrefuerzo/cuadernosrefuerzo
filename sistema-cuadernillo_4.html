<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuadernillo de Verano · Elena De Miguel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFBF4;--bg2:#FFF6E8;--bg3:#FDEFD6;
  --card:#FFFFFF;--border:#F0E4CC;--border2:#E2CCA8;
  --orange:#F97316;--orange-l:#FEF0E4;
  --green:#16A34A;--green-l:#DCFCE7;
  --red:#DC2626;--sky:#0EA5E9;--sky-l:#E0F2FE;
  --ink:#2C1810;--muted:#92745C;--muted2:#C4A882;
  --stripe:#635BFF;--stripe-l:#EEF2FF;
}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;font-size:16px}

/* ── HEADER ── */
header{background:linear-gradient(160deg,#FFF6E0,#FFFBF4);border-bottom:1px solid var(--border);padding:32px 24px 28px;text-align:center}
header h1{font-family:'Lora',serif;font-size:clamp(22px,4vw,36px);font-weight:600;color:var(--ink);margin-bottom:6px}
header h1 em{font-style:italic;color:var(--orange)}
header p{font-size:14px;color:var(--muted);max-width:500px;margin:0 auto}

/* ── PROGRESS ── */
.progress-wrap{background:var(--border);height:5px;position:sticky;top:0;z-index:50}
.progress-bar{height:100%;background:var(--orange);width:0%;transition:width 0.4s ease}

/* ── FORM WRAP ── */
.form-wrap{max-width:700px;margin:0 auto;padding:32px 24px 80px}

/* ── SCREENS ── */
.screen{display:none;animation:fadeIn 0.35s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── STEP INDICATOR ── */
.step-indicator{display:flex;align-items:center;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.step-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted2);flex-shrink:0;transition:all 0.2s}
.step-dot.done{background:var(--green);border-color:var(--green);color:white}
.step-dot.current{background:var(--orange);border-color:var(--orange);color:white}
.step-line{flex:1;height:2px;background:var(--border);min-width:10px}
.step-line.done{background:var(--green)}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 20px;margin-bottom:16px}
.card-title{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:5px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:18px}

/* ── INPUTS ── */
label.field-label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:7px}
.required{color:var(--orange)}
input[type=text],textarea,select{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--ink);background:white;transition:border-color 0.15s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--orange)}
textarea{resize:vertical;min-height:75px}
.field-wrap{margin-bottom:16px}

/* ── OPTION GRID ── */
.option-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:4px}
.option-card input{display:none}
.option-card label{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border:2px solid var(--border);border-radius:12px;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);text-align:center;transition:all 0.15s;background:white}
.option-card label:hover{border-color:var(--orange);color:var(--orange)}
.option-card input:checked+label{border-color:var(--orange);background:var(--orange-l);color:var(--orange)}
.option-icon{font-size:20px}

/* ── SEMÁFORO ── */
.topics-list{display:flex;flex-direction:column;gap:10px}
.topic-row{border:1.5px solid var(--border);border-radius:12px;background:white;overflow:hidden;transition:border-color 0.2s}
.topic-header{display:flex;align-items:center;gap:10px;padding:11px 13px}
.topic-main{flex:1;min-width:0}
.topic-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3}
.topic-example{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;line-height:1.4}
.topic-example strong{font-style:normal;font-weight:700;color:var(--orange);background:var(--orange-l);padding:1px 5px;border-radius:3px;font-size:10px;margin-right:3px}
.semaforo{display:flex;gap:5px;flex-shrink:0}
.sem-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:white}
.sem-btn:hover{transform:scale(1.1)}
.sem-btn.sel-red{background:var(--red);border-color:var(--red);transform:scale(1.08)}
.sem-btn.sel-yellow{background:#FBBF24;border-color:#FBBF24;transform:scale(1.08)}
.sem-btn.sel-green{background:var(--green);border-color:var(--green);transform:scale(1.08)}
.topic-row.state-red{border-color:#FCA5A5;background:#FFF5F5}
.topic-row.state-yellow{border-color:#FCD34D;background:#FFFDF0}
.topic-row.state-green{border-color:#86EFAC;background:#F0FDF4}
.legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* ── CHECKBOXES ── */
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:480px){.check-grid{grid-template-columns:1fr}}
.check-item input{display:none}
.check-item label{display:flex;align-items:center;gap:8px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all 0.15s;background:white}
.check-item label:hover{border-color:var(--orange);color:var(--orange)}
.check-item input:checked+label{border-color:var(--orange);background:var(--orange-l);color:var(--ink)}
.check-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.15s}
.check-item input:checked+label .check-box{background:var(--orange);border-color:var(--orange);color:white}

/* ── NIVEL ── */
.nivel-select{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.nivel-btn input{display:none}
.nivel-btn label{display:block;text-align:center;padding:10px 6px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);transition:all 0.15s}
.nivel-btn label:hover{border-color:var(--orange)}
.nivel-btn input:checked+label{color:white}
.nivel-btn.bajo input:checked+label{background:var(--red);border-color:var(--red)}
.nivel-btn.medio input:checked+label{background:#D97706;border-color:#D97706}
.nivel-btn.alto input:checked+label{background:var(--green);border-color:var(--green)}

/* ── PACK SELECTOR ── */
.pack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:520px){.pack-grid{grid-template-columns:1fr}}
.pack-opt input{display:none}
.pack-opt label{display:flex;flex-direction:column;gap:4px;padding:14px 12px;border:2px solid var(--border);border-radius:14px;cursor:pointer;transition:all 0.15s;background:white}
.pack-opt label:hover{border-color:var(--orange)}
.pack-opt input:checked+label{border-color:var(--orange);background:var(--orange-l)}
.pack-opt .pack-name{font-size:13px;font-weight:800;color:var(--ink)}
.pack-opt .pack-price{font-family:'Lora',serif;font-size:24px;font-weight:600;color:var(--orange);line-height:1}
.pack-opt .pack-per{font-size:10px;color:var(--muted);font-weight:600}
.pack-opt .pack-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-top:4px}
.pack-opt input:checked+label .pack-name{color:var(--orange)}

/* ── UPLOAD ── */
.upload-area{border:2px dashed var(--border2);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg);position:relative}
.upload-area:hover{border-color:var(--orange);background:var(--orange-l)}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-text{font-size:13px;font-weight:700;color:var(--muted)}
.upload-sub{font-size:11px;color:var(--muted2);margin-top:3px}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.file-item{display:flex;align-items:center;gap:7px;background:var(--green-l);border:1px solid #A7F3D0;border-radius:7px;padding:7px 11px;font-size:12px;font-weight:600;color:var(--green)}

/* ── INFO BOX ── */
.info-box{background:var(--sky-l);border:1px solid #BAE6FD;border-radius:11px;padding:12px 15px;font-size:12px;color:#0C4A6E;display:flex;gap:7px;margin-bottom:16px}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;justify-content:space-between;margin-top:24px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all 0.15s;text-decoration:none}
.btn-orange{background:var(--orange);color:white;box-shadow:0 4px 14px rgba(249,115,22,0.28)}
.btn-orange:hover{background:#EA6C0A;transform:translateY(-1px)}
.btn-ghost{background:white;color:var(--muted);border:2px solid var(--border2)}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.btn-green{background:var(--green);color:white;box-shadow:0 4px 14px rgba(22,163,74,0.28)}
.btn-green:hover{background:#15803D;transform:translateY(-1px)}
.btn-stripe{background:var(--stripe);color:white;box-shadow:0 4px 14px rgba(99,91,255,0.28);font-size:15px;padding:14px 32px}
.btn-stripe:hover{background:#4F46E5;transform:translateY(-1px)}
.btn-download{background:var(--green);color:white;font-size:15px;padding:14px 32px;box-shadow:0 4px 14px rgba(22,163,74,0.28)}
.btn-download:hover{background:#15803D;transform:translateY(-2px)}

/* ── CÓDIGO DESCUENTO ── */
.descuento-wrap{margin-top:16px;background:var(--orange-l);border:1px solid #FED7AA;border-radius:14px;padding:16px 18px}
.descuento-wrap label{display:block;font-size:12px;font-weight:800;color:#92400E;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}
.descuento-row{display:flex;gap:8px}
.descuento-input{flex:1;padding:10px 14px;border:2px solid #FED7AA;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--ink);background:white;outline:none;text-transform:uppercase;letter-spacing:0.08em}
.descuento-input:focus{border-color:var(--orange)}
.descuento-btn{background:var(--orange);color:white;border:none;border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.descuento-btn:hover{background:#EA6C0A}
.descuento-ok{display:none;margin-top:8px;font-size:13px;font-weight:700;color:var(--green)}
.descuento-err{display:none;margin-top:8px;font-size:13px;font-weight:700;color:var(--red)}

.error-msg{font-size:11px;color:var(--red);font-weight:600;margin-top:5px;display:none}
.field-error .error-msg{display:block}
.field-error input,.field-error select,.field-error textarea{border-color:var(--red)}

/* ── GENERANDO SCREEN ── */
.generating-wrap{text-align:center;padding:60px 24px}
.gen-icon{font-size:60px;margin-bottom:16px;animation:bounce 1.2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.gen-title{font-family:'Lora',serif;font-size:26px;font-weight:600;color:var(--ink);margin-bottom:10px}
.gen-sub{font-size:14px;color:var(--muted);margin-bottom:28px;max-width:420px;margin-left:auto;margin-right:auto}
.gen-steps{display:flex;flex-direction:column;gap:10px;max-width:360px;margin:0 auto}
.gen-step{display:flex;align-items:center;gap:10px;padding:12px 16px;background:white;border:1px solid var(--border);border-radius:12px;font-size:13px;font-weight:600;color:var(--muted);transition:all 0.3s}
.gen-step.active{border-color:var(--orange);color:var(--orange);background:var(--orange-l)}
.gen-step.done{border-color:var(--green);color:var(--green);background:var(--green-l)}
.gen-step-icon{font-size:20px;flex-shrink:0}
.gen-progress{width:100%;height:8px;background:var(--border);border-radius:100px;margin-top:24px;overflow:hidden}
.gen-progress-bar{height:100%;background:linear-gradient(90deg,var(--orange),#FBBF24);border-radius:100px;width:0%;transition:width 0.6s ease}

/* ── PAGO SCREEN ── */
.payment-wrap{max-width:480px;margin:0 auto;padding:32px 24px}
.payment-header{text-align:center;margin-bottom:28px}
.payment-header h2{font-family:'Lora',serif;font-size:26px;font-weight:600;color:var(--ink);margin-bottom:6px}
.payment-header p{font-size:14px;color:var(--muted)}
.order-summary{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:18px 20px;margin-bottom:20px}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.order-row:last-child{border-bottom:none;font-size:16px;font-weight:800;color:var(--ink);padding-top:12px;margin-top:4px}
.order-label{font-size:13px;font-weight:600;color:var(--ink2)}
.order-value{font-size:13px;font-weight:700;color:var(--orange)}
.stripe-form{background:white;border:1px solid var(--border);border-radius:14px;padding:20px}
.stripe-form h3{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.stripe-field{margin-bottom:14px}
.stripe-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.stripe-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--ink);background:white;outline:none;transition:border-color 0.15s}
.stripe-input:focus{border-color:var(--stripe)}
.stripe-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stripe-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:14px;justify-content:center}
.lock-icon{font-size:14px}
.payment-note{background:var(--sky-l);border:1px solid #BAE6FD;border-radius:10px;padding:12px 14px;font-size:12px;color:#0C4A6E;margin-bottom:16px;display:flex;gap:7px}
.bizum-alt{text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.bizum-alt p{font-size:12px;color:var(--muted);margin-bottom:8px}
.bizum-btn{display:inline-flex;align-items:center;gap:6px;background:#00A3FF;color:white;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all 0.15s}
.bizum-btn:hover{background:#0090E0;transform:translateY(-1px)}

/* ── CUADERNILLO PREVIEW ── */
.preview-wrap{max-width:700px;margin:0 auto;padding:32px 24px}
.preview-header{text-align:center;margin-bottom:28px}
.preview-header h2{font-family:'Lora',serif;font-size:28px;font-weight:600;color:var(--ink);margin-bottom:8px}
.preview-header p{font-size:14px;color:var(--muted)}
.preview-stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin:20px 0}
.stat-pill{background:white;border:1px solid var(--border);border-radius:100px;padding:8px 18px;font-size:13px;font-weight:700;color:var(--ink)}
.stat-pill span{color:var(--orange)}
.cuadernillo-preview{background:white;border:2px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.cuad-cover{background:linear-gradient(135deg,#FFF6E0,#FDEFD6);padding:32px 28px;border-bottom:1px solid var(--border);text-align:center}
.cuad-cover h3{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:6px}
.cuad-cover p{font-size:13px;color:var(--muted)}
.cuad-cover .alumno-name{font-size:18px;font-weight:800;color:var(--orange);margin:10px 0 4px}
.cuad-content{padding:20px}
.cuad-section{margin-bottom:20px}
.cuad-section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--orange);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--orange-l)}
.ejercicio{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.ejercicio-num{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.ejercicio-enunciado{font-size:13px;color:var(--ink);line-height:1.6;font-weight:500}
.ejercicio-espacio{height:48px;border:1px dashed var(--border2);border-radius:6px;margin-top:10px;background:white;display:flex;align-items:center;justify-content:center}
.ejercicio-espacio span{font-size:11px;color:var(--muted2);font-style:italic}
.solucion{background:var(--green-l);border:1px solid #A7F3D0;border-radius:6px;padding:8px 12px;margin-top:8px;font-size:12px;color:#15803D;font-weight:600}
.solucion::before{content:"✓ Solución: ";font-weight:800}
.more-pages{text-align:center;padding:20px;background:var(--bg2);border-top:1px solid var(--border);font-size:13px;color:var(--muted)}

/* ── LOADING SPINNER ── */
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ERROR ── */
.error-screen{text-align:center;padding:40px 24px}
.error-screen h2{font-family:'Lora',serif;font-size:24px;color:var(--red);margin-bottom:10px}
.error-screen p{font-size:14px;color:var(--muted);margin-bottom:20px}

/* ── DATO CURIOSO ── */
.dato-curioso-wrap{margin-top:28px;background:linear-gradient(135deg,#FFF6E0,#FEF3DC);border:1px solid #FAD898;border-radius:16px;padding:20px 22px;max-width:480px;margin-left:auto;margin-right:auto;animation:fadeIn 0.5s ease}
.dato-curioso-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--orange);margin-bottom:8px}
.dato-curioso-text{font-size:14px;color:var(--ink);line-height:1.65;font-weight:500;min-height:60px;transition:opacity 0.4s ease}
.dato-curioso-text.fade{opacity:0}
</style>
</head>
<body>

<header>
  <h1>Cuadernillo de <em>Verano</em> ☀️</h1>
  <p>Rellena el diagnóstico y la IA generará tu cuadernillo personalizado al momento</p>
</header>
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

<div class="form-wrap">

<!-- ══ PASO 1: DATOS + CURSO + ASIGNATURA ══ -->
<div class="screen active" id="screen1">
  <div class="step-indicator" id="ind1"></div>
  <div class="card">
    <div class="card-title">👋 Datos de contacto</div>
    <div class="card-sub">Para enviarte el cuadernillo y mantenernos en contacto.</div>
    <div class="field-wrap" id="wrap-nombre"><label class="field-label">Nombre del padre/madre <span class="required">*</span></label><input type="text" id="nombre" placeholder="Tu nombre completo"><div class="error-msg">Campo obligatorio</div></div>
    <div class="field-wrap" id="wrap-telefono"><label class="field-label">WhatsApp <span class="required">*</span></label><input type="text" id="telefono" placeholder="6XX XXX XXX"><div class="error-msg">Campo obligatorio</div></div>
    <div class="field-wrap" id="wrap-alumno"><label class="field-label">Nombre del alumno/a <span class="required">*</span></label><input type="text" id="alumno" placeholder="Nombre de tu hijo/a"><div class="error-msg">Campo obligatorio</div></div>
  </div>
  <div class="card">
    <div class="card-title">📚 Curso y asignatura</div>
    <div class="card-sub">Selecciona el curso y la asignatura a reforzar este verano.</div>
    <div class="field-wrap" id="wrap-curso">
      <label class="field-label">Curso <span class="required">*</span></label>
      <div class="option-grid">
        <div class="option-card"><input type="radio" name="curso" id="c5p" value="5P"><label for="c5p"><span class="option-icon">🌱</span>5º Prim.</label></div>
        <div class="option-card"><input type="radio" name="curso" id="c6p" value="6P"><label for="c6p"><span class="option-icon">🌿</span>6º Prim.</label></div>

// ── VALIDACIÓN ──
function validate(step){
  let ok=true;
  if(step===1){
    ['nombre','telefono','alumno'].forEach(id=>{
      const w=document.getElementById('wrap-'+id),v=document.getElementById(id).value.trim();
      w.classList.toggle('field-error',!v);if(!v)ok=false;
    });
    const cur=document.querySelector('input[name="curso"]:checked');
    const asi=document.querySelector('input[name="asig"]:checked');
    document.getElementById('wrap-curso').classList.toggle('field-error',!cur);
    document.getElementById('wrap-asig').classList.toggle('field-error',!asi);
    if(!cur||!asi)ok=false;
    if(ok){state.nombre=document.getElementById('nombre').value.trim();state.telefono=document.getElementById('telefono').value.trim();state.alumno=document.getElementById('alumno').value.trim();state.curso=cur.value;state.asig=asi.value;}
  }
  if(step===2){
    const has=Object.keys(state.semaforo).length>0;
    document.getElementById('sem-error').style.display=has?'none':'block';
    if(!has)ok=false;
  }
  if(step===3){
    const nivelEl = document.querySelector('input[name="nivel"]:checked');
    state.nivel = nivelEl ? nivelEl.value : '';
    const comEl = document.getElementById('comentarios');
    state.comentarios = comEl ? comEl.value.trim() : '';
    const packErr = document.getElementById('pack-error');
    if(!state.pack){
      if(packErr) packErr.style.display='block';
      ok=false;
    } else {
      if(packErr) packErr.style.display='none';
    }
  }
  return ok;
}

// ── NAVEGACIÓN ──
function go(from,to){
  from = parseInt(from);
  if(!validate(from)) return;
  if(from===1 && to===2){ renderTopics(); }
  if(from===2 && to===3){ renderObjetivos(); renderPacks(); }
  if(to==='gen'){ startGeneration(); return; }
  var toNum = parseInt(to);
  document.getElementById('screen'+from).classList.remove('active');
  document.getElementById('screen'+toNum).classList.add('active');
  renderInd(toNum);
  updateProg(toNum);
  window.scrollTo({top:0,behavior:'smooth'});
}

function animateGenerationSteps(){

  const icons=['🔍','✏️','✅','📄'];
  const genIcon=document.getElementById('genIcon');

  const next=()=>{
    if(current>0) document.getElementById(steps[current-1]).className='gen-step done';
    if(current<steps.length){
      document.getElementById(steps[current]).className='gen-step active';
      if(genIcon) genIcon.textContent=icons[current]||'✨';
      bar.style.width=((current+1)/steps.length*90)+'%';
      current++;
      setTimeout(next, 6000/steps.length);
    }
  };
  next();
}

  if(status){ status.style.display='block'; status.textContent='✅ Archivo descargado. Abrelo en el navegador y usa Ctrl+P / Cmd+P para imprimir como PDF.'; }
}

// INIT
renderInd(1);updateProg(1);
</script>
